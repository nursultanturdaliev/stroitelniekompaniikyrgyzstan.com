name: Daily Publishing Update
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run daily publishing
        run: npm run daily:update

      - name: Commit and push updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/dailyUpdates.json content-ops/publishing-log.json content-ops/publishing-todo.json content-ops/daily-plan-status.md
            git commit -m "chore: run daily publishing update"
            git push
          fi
