# Еженедельная отправка сводки mergeChangelog в Telegram (при настроенных секретах).
# Секреты репозитория: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
name: Weekly merge digest Telegram

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send-merge-digest.mjs
